<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connected Futures Hub — Investment Readiness Assessment</title>
<style>
  :root {
    --purple: #8B00CC;
    --purple-dark: #5a0085;
    --purple-mid: #a020e0;
    --purple-light: #f3e6fc;
    --purple-pale: #faf0ff;
    --orange: #E8401C;
    --orange-mid: #f07030;
    --gold: #F5A623;
    --cream: #fdf9ff;
    --white: #ffffff;
    --grey-light: #f2eef6;
    --grey-mid: #d4c8e0;
    --grey-text: #6a5a7a;
    --red: #c0392b;
    --orange-warn: #e67e22;
    --text: #2a1a3a;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(139,0,204,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, var(--purple-dark) 0%, var(--purple) 100%);
    padding: 28px 24px 22px; text-align: center;
  }
  .wordmark { font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.7); margin-bottom: 6px; }
  header h1 { font-size: 21px; font-weight: 700; color: white; margin-bottom: 4px; }
  header p { font-size: 13px; color: rgba(255,255,255,0.75); }

  .container { max-width: 760px; margin: 0 auto; padding: 28px 16px 60px; }

  .progress-bar-wrap { background: var(--grey-light); border-radius: 20px; height: 6px; margin: 0 0 28px; overflow: hidden; }
  .progress-bar-fill { height: 6px; background: linear-gradient(90deg, var(--purple), var(--gold)); border-radius: 20px; transition: width 0.4s ease; }
  .progress-label { font-size: 12px; color: var(--grey-text); text-align: right; margin-bottom: 6px; }

  .card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 28px; margin-bottom: 20px; }
  .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .card-icon { width: 40px; height: 40px; border-radius: 8px; background: linear-gradient(135deg, var(--purple-dark), var(--purple-mid)); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .card-title { font-size: 17px; font-weight: 700; color: var(--purple-dark); }
  .card-subtitle { font-size: 12px; color: var(--grey-text); margin-top: 2px; }

  .question { margin-bottom: 22px; }
  .question label { display: block; font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 10px; line-height: 1.4; }
  .options { display: flex; flex-direction: column; gap: 7px; }
  .option { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border: 1.5px solid var(--grey-mid); border-radius: 7px; cursor: pointer; transition: all 0.15s; font-size: 13.5px; color: var(--grey-text); background: var(--grey-light); user-select: none; }
  .option:hover { border-color: var(--purple-mid); color: var(--text); background: white; }
  .option.selected { border-color: var(--purple); background: var(--purple-light); color: var(--purple-dark); font-weight: 600; }
  .option .radio { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--grey-mid); flex-shrink: 0; transition: all 0.15s; }
  .option.selected .radio { border-color: var(--purple); background: var(--purple); }

  .intake-intro { font-size: 14px; color: var(--grey-text); line-height: 1.65; margin-bottom: 24px; }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 7px; }
  .form-group input, .form-group select { width: 100%; padding: 11px 14px; border: 1.5px solid var(--grey-mid); border-radius: 7px; font-size: 14px; color: var(--text); background: var(--grey-light); outline: none; transition: border-color 0.15s; }
  .form-group input:focus, .form-group select:focus { border-color: var(--purple); background: white; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .nav-buttons { display: flex; gap: 12px; margin-top: 24px; }
  .btn { padding: 12px 24px; border: none; border-radius: 7px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: var(--purple); color: white; flex: 1; }
  .btn-primary:hover { background: var(--purple-mid); }
  .btn-primary:disabled { background: var(--grey-mid); cursor: not-allowed; }
  .btn-secondary { background: var(--grey-light); color: var(--grey-text); border: 1.5px solid var(--grey-mid); }
  .btn-secondary:hover { background: white; color: var(--text); }
  .btn-gold { background: linear-gradient(135deg, var(--orange), var(--gold)); color: white; flex: 1; }
  .btn-gold:hover { opacity: 0.9; }
  .btn-outline { background: white; color: var(--purple); border: 2px solid var(--purple); flex: 1; }
  .btn-outline:hover { background: var(--purple-light); }

  .section-tag { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: white; background: var(--purple); padding: 3px 10px; border-radius: 4px; margin-bottom: 14px; }

  .radar-wrap { text-align: center; margin: 0 auto 24px; max-width: 380px; }
  canvas#radarChart { width: 100% !important; height: auto !important; }

  .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
  .result-card { padding: 14px 16px; border-radius: 8px; border-left: 4px solid var(--purple); background: var(--grey-light); }
  .result-card.strength { border-left-color: #2ecc71; background: #eefaf3; }
  .result-card.focus { border-left-color: var(--orange-warn); background: #fef6ee; }
  .result-card.priority { border-left-color: var(--red); background: #fef0ee; }
  .result-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--grey-text); margin-bottom: 4px; }
  .result-score { font-size: 22px; font-weight: 800; color: var(--purple-dark); }
  .result-tag { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-top: 6px; }
  .tag-strength { background: #c8f0d8; color: #1a6a3a; }
  .tag-focus { background: #fde8cc; color: #7a3a00; }
  .tag-priority { background: #fdd8d4; color: #7a1a0a; }

  .ai-feedback-section { margin-top: 16px; }
  .ai-feedback-box { background: var(--grey-light); border: 1.5px solid var(--grey-mid); border-radius: 8px; padding: 16px; font-size: 13.5px; line-height: 1.7; color: var(--text); min-height: 60px; }
  .ai-feedback-box.loading { color: var(--grey-text); font-style: italic; }
  .ai-feedback-box.error { color: var(--red); }
  .ai-dim-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .ai-dim-title { font-size: 14px; font-weight: 700; color: var(--purple-dark); }
  .btn-ai { font-size: 12px; padding: 6px 14px; background: var(--purple); color: white; border: none; border-radius: 5px; cursor: pointer; }
  .btn-ai:hover { background: var(--purple-mid); }

  .mentor-intro { font-size: 14px; color: var(--grey-text); line-height: 1.65; margin-bottom: 22px; }
  .mentor-area { margin-bottom: 18px; }
  .mentor-area label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
  .mentor-area textarea { width: 100%; padding: 11px 14px; border: 1.5px solid var(--grey-mid); border-radius: 7px; font-size: 13.5px; color: var(--text); background: var(--grey-light); outline: none; resize: vertical; min-height: 80px; font-family: inherit; transition: border-color 0.15s; }
  .mentor-area textarea:focus { border-color: var(--purple); background: white; }
  .checkbox-group { display: flex; flex-direction: column; gap: 8px; }
  .checkbox-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border: 1.5px solid var(--grey-mid); border-radius: 7px; cursor: pointer; background: var(--grey-light); transition: all 0.15s; }
  .checkbox-item:hover { border-color: var(--purple-mid); background: white; }
  .checkbox-item.checked { border-color: var(--purple); background: var(--purple-light); }
  .checkbox-item input[type="checkbox"] { margin-top: 2px; accent-color: var(--purple); flex-shrink: 0; width: 16px; height: 16px; }
  .checkbox-item span { font-size: 13.5px; color: var(--grey-text); line-height: 1.4; }
  .checkbox-item.checked span { color: var(--purple-dark); font-weight: 600; }
  .star-rating { display: flex; gap: 8px; margin-top: 4px; }
  .star { font-size: 28px; cursor: pointer; color: var(--grey-mid); transition: color 0.1s; }
  .star.active { color: var(--gold); }
  .scale-options { display: flex; gap: 6px; flex-wrap: wrap; }
  .scale-btn { width: 42px; height: 42px; border-radius: 7px; border: 1.5px solid var(--grey-mid); background: var(--grey-light); font-size: 14px; font-weight: 600; cursor: pointer; color: var(--grey-text); transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
  .scale-btn:hover { border-color: var(--purple-mid); background: white; }
  .scale-btn.selected { border-color: var(--purple); background: var(--purple-light); color: var(--purple-dark); }
  .scale-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--grey-text); margin-top: 4px; }

  .submit-box { background: linear-gradient(135deg, var(--purple-dark), var(--purple)); border-radius: var(--radius); padding: 24px; color: white; text-align: center; margin-top: 24px; }
  .submit-box h3 { font-size: 17px; margin-bottom: 8px; }
  .submit-box p { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 18px; }
  .submit-success { background: rgba(255,255,255,0.15); border-radius: 8px; padding: 18px; text-align: center; color: white; margin-top: 16px; display: none; }
  .submit-success .tick { font-size: 32px; margin-bottom: 8px; }

  .hidden-form { position: absolute; left: -9999px; width: 1px; height: 1px; overflow: hidden; }

  @media (max-width: 600px) {
    .results-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .card { padding: 18px; }
    .header-logos img { height: 38px; }
  }
</style>
</head>
<body>

<header>
  <div class="wordmark">Connected Futures Hub</div>
  <h1>Investment Readiness Assessment</h1>
  <p>Investor Readiness Program for Regional Female Entrepreneurs</p>
</header>

<form class="hidden-form" name="cfh-tna" data-netlify="true" netlify-honeypot="bot-field">
  <input type="hidden" name="form-name" value="cfh-tna">
  <input name="bot-field">
  <input name="founder_name"><input name="business_name"><input name="stage"><input name="assessment_type">
  <input name="submission_date"><input name="score_business_foundations"><input name="score_investor_readiness">
  <input name="score_commercialisation"><input name="score_founder_capability"><input name="score_networks">
  <input name="score_wellbeing"><input name="overall_score">
  <input name="mentor_support_areas"><input name="mentor_challenge"><input name="mentor_style">
  <input name="mentor_availability"><input name="mentor_goals"><input name="mentor_other">
  <input name="mentoring_rating"><input name="mentoring_sessions"><input name="mentoring_impact">
  <input name="mentoring_highlight"><input name="mentoring_improve"><input name="mentoring_recommend">
</form>

<div class="container">
  <div id="app"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
let state = {
  screen: 'intake', section: 0,
  intake: { name: '', business: '', stage: '', type: '' },
  answers: {}, mentorData: {}, scores: {}
};

const dimensions = [
  {
    id: 'business_foundations', label: 'Business Foundations', icon: '🌱',
    desc: 'Problem clarity, customer validation & value proposition',
    questions: [
      { id: 'bf1', text: 'How clearly defined is the problem your business solves?', options: ['We have early assumptions about the problem', 'We have spoken with some potential customers', 'We have validated the problem with 10+ customers', 'We have paying customers who confirm the problem'] },
      { id: 'bf2', text: 'How well do you understand your target customer?', options: ['We have a broad idea of who our customer is', 'We have a defined customer segment but limited research', 'We have a clear customer profile backed by research', 'We have deep customer insight and active relationships'] },
      { id: 'bf3', text: 'How compelling and clearly articulated is your value proposition?', options: ['We are still working out what makes us different', 'We have a value proposition but it needs refinement', 'We have a clear and tested value proposition', 'Our value proposition is proven and resonates strongly with customers'] },
      { id: 'bf4', text: 'How much real-world traction does your business have?', options: ['Pre-revenue — idea or early development stage', 'Some early interest or pilot customers', 'Generating revenue with growing customer base', 'Strong revenue and proven commercial model'] },
      { id: 'bf5', text: 'How well defined is your competitive advantage?', options: ['We haven\'t mapped the competitive landscape yet', 'We are aware of competitors but haven\'t defined our edge', 'We have a clear competitive advantage', 'We have defensible differentiation that is hard to replicate'] }
    ]
  },
  {
    id: 'investor_readiness', label: 'Investor Readiness', icon: '💜',
    desc: 'Pitch deck, financials, funding ask & capital pathways',
    questions: [
      { id: 'ir1', text: 'Do you have a pitch deck?', options: ['Not started', 'Draft in progress', 'Completed and tested with friends/family', 'Investor-tested and refined'] },
      { id: 'ir2', text: 'How developed are your financial projections?', options: ['No financial projections yet', 'Back-of-envelope estimates only', 'A 3-year model with key assumptions', 'A detailed financial model stress-tested with advisors'] },
      { id: 'ir3', text: 'How clearly defined is your investment ask?', options: ['We haven\'t defined a funding ask yet', 'We have a rough idea of how much we need', 'We have a clear ask with a high-level use of funds', 'We have a precise ask tied to specific milestones and outcomes'] },
      { id: 'ir4', text: 'How familiar are you with investment pathways and capital types?', options: ['Investment feels like a foreign language to me', 'I understand the basics but have gaps', 'I have a good understanding of relevant capital options', 'I am fluent in investment pathways and can discuss them confidently'] },
      { id: 'ir5', text: 'Have you had conversations with investors or angel networks?', options: ['Not yet — this feels out of reach right now', 'I have had one or two informal conversations', 'I have actively engaged with investors or pitch events', 'I have received term sheets or closed investment'] }
    ]
  },
  {
    id: 'commercialisation', label: 'Commercialisation & Scaling', icon: '📈',
    desc: 'Revenue model, go-to-market strategy & growth planning',
    questions: [
      { id: 'cs1', text: 'How developed is your revenue model?', options: ['No revenue model yet', 'We have a broad idea of how we\'ll make money', 'We have a defined revenue model but haven\'t fully tested it', 'We have a tested revenue model with paying customers'] },
      { id: 'cs2', text: 'How developed is your go-to-market strategy?', options: ['No GTM strategy yet', 'We have a rough plan but it\'s not documented', 'We have a documented GTM strategy', 'We have an active GTM strategy generating leads and sales'] },
      { id: 'cs3', text: 'How clearly have you defined your pricing strategy?', options: ['No pricing defined yet', 'We have a rough idea based on cost or guesswork', 'We have a defined pricing model based on research', 'We have validated pricing with real sales evidence'] },
      { id: 'cs4', text: 'How ready is your business to scale?', options: ['Scaling feels a long way off right now', 'We are thinking about what scaling would look like', 'We have a clear path to scale with known requirements', 'We are actively scaling with systems and team in place'] },
      { id: 'cs5', text: 'How strong are your partnerships and distribution channels?', options: ['No partnerships or channels in place yet', 'A few informal contacts or relationships', 'Active relationships with potential partners or channels', 'Formal agreements driving customer acquisition'] }
    ]
  },
  {
    id: 'founder_capability', label: 'Founder Capability', icon: '⭐',
    desc: 'Financial literacy, pitching confidence & strategic thinking',
    questions: [
      { id: 'fc1', text: 'How confident are you in pitching your business to investors?', options: ['Pitching feels very daunting right now', 'I can explain what I do but struggle under pressure', 'I can pitch confidently with a clear narrative', 'I pitch with conviction and handle tough questions well'] },
      { id: 'fc2', text: 'How strong is your financial literacy as a founder?', options: ['Numbers are not my strength — I need a lot of support', 'I understand the basics but struggle with modelling', 'I am comfortable with financial concepts and my own numbers', 'I have strong financial fluency and can model scenarios confidently'] },
      { id: 'fc3', text: 'How developed is your strategic thinking about the future of your business?', options: ['I am focused on day-to-day survival right now', 'I have a rough idea of where I want to go', 'I have a clear 1–3 year strategic vision', 'I have a compelling long-term vision with a credible roadmap'] },
      { id: 'fc4', text: 'How well do you understand your own leadership strengths and gaps?', options: ['I haven\'t had much time to reflect on this', 'I have some awareness but it\'s not well-defined', 'I have a good understanding of my strengths and where I need support', 'I actively develop myself as a leader and know how to build around my gaps'] },
      { id: 'fc5', text: 'How effectively do you communicate your brand and story?', options: ['Branding and storytelling are areas I need to develop', 'I can explain what I do but my story isn\'t polished', 'I have a clear brand and can tell my story compellingly', 'My brand and narrative are strong and consistently delivered across all channels'] }
    ]
  },
  {
    id: 'networks', label: 'Networks & Relationships', icon: '🔗',
    desc: 'Investor connections, mentors & support ecosystem',
    questions: [
      { id: 'nw1', text: 'How strong is your current network of mentors and advisors?', options: ['I don\'t have mentors or advisors yet', 'I have one or two informal people I turn to', 'I have a small but engaged group of mentors', 'I have an active advisory network with relevant expertise'] },
      { id: 'nw2', text: 'How connected are you to the investor and angel community?', options: ['I don\'t have any connections to investors yet', 'I know of investors but haven\'t engaged with them', 'I have met some investors and am building relationships', 'I have established relationships with relevant investors'] },
      { id: 'nw3', text: 'How strong is your broader entrepreneurial and industry network?', options: ['I feel quite isolated in my entrepreneurial journey', 'I have a small network of peers and contacts', 'I have an active network across my industry and the startup ecosystem', 'I have a strong, diverse network that opens doors and creates opportunities'] },
      { id: 'nw4', text: 'How well connected are you to regional support programs and ecosystems?', options: ['I haven\'t engaged much with regional programs', 'I am aware of programs but haven\'t made the most of them', 'I actively participate in regional programs and events', 'I am deeply embedded in the regional innovation ecosystem'] },
      { id: 'nw5', text: 'How effectively do you use your network to grow your business?', options: ['I find it hard to ask for help or make introductions', 'I occasionally reach out but it doesn\'t feel natural', 'I actively leverage my network for introductions and opportunities', 'Relationship-building is a core part of how I grow my business'] }
    ]
  },
  {
    id: 'wellbeing', label: 'Founder Wellbeing & Resilience', icon: '💛',
    desc: 'Confidence, resilience & sustainable founder practices',
    questions: [
      { id: 'wb1', text: 'How would you describe your overall confidence as a founder right now?', options: ['I often doubt whether I belong in this space', 'I have moments of confidence but also a lot of self-doubt', 'I generally feel confident in my abilities and direction', 'I feel strong and grounded in my identity as a founder'] },
      { id: 'wb2', text: 'How well do you manage the emotional demands of running a business?', options: ['It often feels overwhelming and I struggle to cope', 'I manage most of the time but have difficult periods', 'I have good strategies for managing stress and setbacks', 'I have strong resilience practices and support systems in place'] },
      { id: 'wb3', text: 'How sustainable is your current pace and workload?', options: ['I am running on empty and this pace isn\'t sustainable', 'It\'s tough but I\'m managing — just', 'My workload is demanding but generally sustainable', 'I have found a rhythm that works for me and my business'] },
      { id: 'wb4', text: 'How supported do you feel in your entrepreneurial journey?', options: ['I often feel like I\'m doing this completely alone', 'I have some support but it\'s not consistent', 'I feel reasonably well supported by people around me', 'I have a strong support network of family, peers and mentors'] },
      { id: 'wb5', text: 'How well do you manage barriers specific to being a regional female founder?', options: ['Geographic and cultural barriers significantly impact me', 'I face barriers but don\'t always have strategies to address them', 'I have developed strategies to navigate most barriers I face', 'I actively turn my regional and founder identity into a strength'] }
    ]
  }
];

const mentorQuestions = {
  pre: [
    { id: 'mentor_support_areas', type: 'checkbox', label: 'Which areas would you most value mentor support in? (Select all that apply)', options: ['Pitch development and storytelling', 'Financial modelling and literacy', 'Investment pathways and capital strategy', 'Commercialisation and go-to-market strategy', 'Branding and communications', 'Scaling and growth strategy', 'Building investor relationships and networks', 'Founder confidence and mindset', 'Regional network building', 'Legal, governance and due diligence preparation'] },
    { id: 'mentor_challenge', type: 'textarea', label: 'What is the single biggest challenge you are trying to solve right now? (2–3 sentences)', placeholder: 'Describe your most pressing challenge as a founder...' },
    { id: 'mentor_style', type: 'options', label: 'What kind of mentoring style works best for you?', options: ['A sounding board — I want someone to think through problems with me', 'A challenger — I want someone who will push back and stress-test my thinking', 'A connector — I want introductions to investors, customers and industry contacts', 'A coach — I want structured guidance and accountability', 'A domain expert — I want deep knowledge in a specific area I can tap into'] },
    { id: 'mentor_availability', type: 'options', label: 'How would you prefer to engage with your mentor?', options: ['Monthly check-in (1 hour/month)', 'Fortnightly catch-up (30–45 min, fortnightly)', 'Intensive sprint (weekly for 4–6 weeks, then tapering)', 'On-demand — as needed rather than scheduled'] },
    { id: 'mentor_goals', type: 'textarea', label: 'What would a successful mentoring relationship look like for you by the end of the program?', placeholder: 'E.g. investor-ready pitch deck, first investor meeting secured, clarity on funding strategy...' },
    { id: 'mentor_other', type: 'textarea', label: 'Is there anything else that would help us match you with the right mentor? (optional)', placeholder: 'E.g. preferred background, lived experience, regional knowledge, industry expertise...', optional: true }
  ],
  post: [
    { id: 'mentoring_rating', type: 'stars', label: 'Overall, how would you rate your mentoring experience during the program?' },
    { id: 'mentoring_sessions', type: 'options', label: 'How many mentoring sessions did you have with your mentor?', options: ['1–2 sessions', '3–4 sessions', '5–6 sessions', '7 or more sessions'] },
    { id: 'mentoring_impact', type: 'scale', label: 'How much impact did your mentoring have on your progress as a founder? (1 = no impact, 10 = transformational)', min: 1, max: 10 },
    { id: 'mentoring_highlight', type: 'textarea', label: 'What was the most valuable thing your mentor helped you with?', placeholder: 'Describe the most impactful contribution your mentor made...' },
    { id: 'mentoring_improve', type: 'textarea', label: 'What could have made the mentoring experience even better?', placeholder: 'E.g. more sessions, different focus areas, better initial matching...' },
    { id: 'mentoring_recommend', type: 'options', label: 'Would you recommend that Connected Futures Hub continue the mentoring program for future cohorts?', options: ['Definitely — it was one of the most valuable parts of the program', 'Yes, with some improvements', 'Neutral — it was helpful but not critical', 'Probably not in its current form', 'No — other support would be better use of resources'] }
  ]
};

function render() {
  const app = document.getElementById('app');
  if (state.screen === 'intake') app.innerHTML = renderIntake();
  else if (state.screen === 'assessment') app.innerHTML = renderAssessment();
  else if (state.screen === 'mentor') app.innerHTML = renderMentor();
  else if (state.screen === 'results') { app.innerHTML = renderResults(); drawRadar(); }
  attachHandlers();
}

function renderIntake() {
  return `
    <div class="card">
      <div class="section-tag">Before you begin</div>
      <div class="card-header">
        <div class="card-icon">💜</div>
        <div><div class="card-title">Welcome to the CFH Investment Readiness Assessment</div><div class="card-subtitle">Takes about 10–15 minutes to complete</div></div>
      </div>
      <p class="intake-intro">This assessment helps the Connected Futures Hub team understand where you are at across six key dimensions of investment readiness, so we can tailor program support to your specific needs. Your responses are confidential and will only be used by the CFH team to better support you on your journey.</p>
      <div class="form-row">
        <div class="form-group"><label>Your name *</label><input type="text" id="i-name" placeholder="e.g. Sarah Williams" value="${state.intake.name}"></div>
        <div class="form-group"><label>Business name *</label><input type="text" id="i-business" placeholder="e.g. Bloom Co Pty Ltd" value="${state.intake.business}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Business stage *</label>
          <select id="i-stage">
            <option value="" ${!state.intake.stage?'selected':''}>Select stage...</option>
            <option value="Idea" ${state.intake.stage==='Idea'?'selected':''}>Idea</option>
            <option value="Early traction" ${state.intake.stage==='Early traction'?'selected':''}>Early traction</option>
            <option value="Revenue-generating" ${state.intake.stage==='Revenue-generating'?'selected':''}>Revenue-generating</option>
            <option value="Scaling" ${state.intake.stage==='Scaling'?'selected':''}>Scaling</option>
            <option value="Preparing to raise capital" ${state.intake.stage==='Preparing to raise capital'?'selected':''}>Preparing to raise capital</option>
          </select>
        </div>
        <div class="form-group"><label>Assessment point *</label>
          <select id="i-type">
            <option value="" ${!state.intake.type?'selected':''}>Select...</option>
            <option value="Start of program" ${state.intake.type==='Start of program'?'selected':''}>Start of program</option>
            <option value="End of program" ${state.intake.type==='End of program'?'selected':''}>End of program</option>
          </select>
        </div>
      </div>
      <div class="nav-buttons"><button class="btn btn-primary" onclick="startAssessment()">Begin assessment →</button></div>
    </div>`;
}

function startAssessment() {
  const name = document.getElementById('i-name').value.trim();
  const business = document.getElementById('i-business').value.trim();
  const stage = document.getElementById('i-stage').value;
  const type = document.getElementById('i-type').value;
  if (!name || !business || !stage || !type) { alert('Please complete all fields before continuing.'); return; }
  state.intake = { name, business, stage, type };
  state.screen = 'assessment'; state.section = 0;
  window.scrollTo({ top: 0 }); render();
}

function renderAssessment() {
  const dim = dimensions[state.section];
  const pct = Math.round((state.section / dimensions.length) * 100);
  const answered = dim.questions.filter(q => state.answers[q.id] !== undefined).length;
  return `
    <div class="progress-label">Section ${state.section + 1} of ${dimensions.length}</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="card">
      <div class="section-tag">Dimension ${state.section + 1}</div>
      <div class="card-header">
        <div class="card-icon">${dim.icon}</div>
        <div><div class="card-title">${dim.label}</div><div class="card-subtitle">${dim.desc}</div></div>
      </div>
      ${dim.questions.map(q => renderQuestion(q)).join('')}
      <div class="nav-buttons">
        ${state.section > 0 ? `<button class="btn btn-secondary" onclick="prevSection()">← Back</button>` : ''}
        <button class="btn btn-primary" onclick="nextSection()" ${answered < dim.questions.length ? 'disabled' : ''}>
          ${state.section < dimensions.length - 1 ? 'Next section →' : 'Continue to mentor matching →'}
        </button>
      </div>
    </div>`;
}

function renderQuestion(q) {
  return `<div class="question"><label>${q.text}</label><div class="options">${q.options.map((opt, i) => `<div class="option ${state.answers[q.id] === i ? 'selected' : ''}" onclick="selectAnswer('${q.id}', ${i})"><div class="radio"></div>${opt}</div>`).join('')}</div></div>`;
}

function selectAnswer(qid, idx) { state.answers[qid] = idx; render(); }
function prevSection() { state.section--; window.scrollTo({ top: 0 }); render(); }

function nextSection() {
  const dim = dimensions[state.section];
  const answered = dim.questions.filter(q => state.answers[q.id] !== undefined).length;
  if (answered < dim.questions.length) { alert('Please answer all questions before continuing.'); return; }
  if (state.section < dimensions.length - 1) { state.section++; window.scrollTo({ top: 0 }); render(); }
  else { calculateScores(); state.screen = 'mentor'; window.scrollTo({ top: 0 }); render(); }
}

function calculateScores() {
  state.scores = {};
  dimensions.forEach(dim => {
    const total = dim.questions.reduce((sum, q) => sum + (state.answers[q.id] || 0), 0);
    state.scores[dim.id] = Math.round((total / (dim.questions.length * 3)) * 100);
  });
}

function renderMentor() {
  const isPre = state.intake.type === 'Start of program';
  const qs = isPre ? mentorQuestions.pre : mentorQuestions.post;
  const intro = isPre
    ? 'We\'d like to match you with the right mentor for your journey through the Connected Futures Hub program. Your answers below will help us make the best possible match. There are no right or wrong answers — just be honest about what you need most.'
    : 'Thank you for completing the end-of-program assessment. We\'d love to hear about your mentoring experience so we can continue to improve the program for future cohorts.';
  return `
    <div class="progress-label">Almost done — just a few more questions</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:90%"></div></div>
    <div class="card">
      <div class="section-tag">${isPre ? 'Mentor matching' : 'Program feedback'}</div>
      <div class="card-header">
        <div class="card-icon">${isPre ? '🤝' : '💬'}</div>
        <div><div class="card-title">${isPre ? 'Mentor Matching' : 'Mentoring Feedback'}</div><div class="card-subtitle">${isPre ? 'Help us find the right mentor for your journey' : 'Tell us how the mentoring went'}</div></div>
      </div>
      <p class="mentor-intro">${intro}</p>
      ${qs.map(q => renderMentorQuestion(q)).join('')}
      <div class="nav-buttons">
        <button class="btn btn-secondary" onclick="backToAssessment()">← Back</button>
        <button class="btn btn-primary" onclick="showResults()">View my results →</button>
      </div>
    </div>`;
}

function renderMentorQuestion(q) {
  const val = state.mentorData[q.id];
  if (q.type === 'checkbox') {
    const checked = val || [];
    return `<div class="mentor-area"><label>${q.label}</label><div class="checkbox-group">${q.options.map((opt, i) => `<label class="checkbox-item ${checked.includes(i)?'checked':''}"><input type="checkbox" ${checked.includes(i)?'checked':''} onchange="toggleCheckbox('${q.id}', ${i})"><span>${opt}</span></label>`).join('')}</div></div>`;
  }
  if (q.type === 'textarea') return `<div class="mentor-area"><label>${q.label}</label><textarea id="mq-${q.id}" placeholder="${q.placeholder||''}" oninput="saveMentorText('${q.id}')">${val||''}</textarea></div>`;
  if (q.type === 'options') return `<div class="mentor-area"><label>${q.label}</label><div class="options">${q.options.map((opt, i) => `<div class="option ${val===i?'selected':''}" onclick="selectMentorOption('${q.id}', ${i})"><div class="radio"></div>${opt}</div>`).join('')}</div></div>`;
  if (q.type === 'stars') { const r = val||0; return `<div class="mentor-area"><label>${q.label}</label><div class="star-rating">${[1,2,3,4,5].map(n=>`<span class="star ${r>=n?'active':''}" onclick="setStars('${q.id}',${n})">★</span>`).join('')}</div></div>`; }
  if (q.type === 'scale') { const nums = Array.from({length:q.max-q.min+1},(_,i)=>i+q.min); return `<div class="mentor-area"><label>${q.label}</label><div class="scale-options">${nums.map(n=>`<button class="scale-btn ${val===n?'selected':''}" onclick="setScale('${q.id}',${n})">${n}</button>`).join('')}</div><div class="scale-labels"><span>No impact</span><span>Transformational</span></div></div>`; }
  return '';
}

function toggleCheckbox(id, idx) { if (!state.mentorData[id]) state.mentorData[id]=[]; const a=state.mentorData[id]; const p=a.indexOf(idx); if(p>-1)a.splice(p,1); else a.push(idx); render(); }
function saveMentorText(id) { state.mentorData[id]=document.getElementById('mq-'+id)?.value||''; }
function selectMentorOption(id,idx) { state.mentorData[id]=idx; render(); }
function setStars(id,n) { state.mentorData[id]=n; render(); }
function setScale(id,n) { state.mentorData[id]=n; render(); }
function backToAssessment() { state.section=dimensions.length-1; state.screen='assessment'; window.scrollTo({top:0}); render(); }
function showResults() { state.screen='results'; window.scrollTo({top:0}); render(); }

function renderResults() {
  const overall = Math.round(Object.values(state.scores).reduce((a,b)=>a+b,0)/dimensions.length);
  const sorted = [...dimensions].sort((a,b)=>state.scores[b.id]-state.scores[a.id]);
  function getTag(s) { return s>=67?'<span class="result-tag tag-strength">Strength</span>':s>=40?'<span class="result-tag tag-focus">Focus area</span>':'<span class="result-tag tag-priority">Priority</span>'; }
  function getClass(s) { return s>=67?'strength':s>=40?'focus':'priority'; }
  return `
    <div class="card">
      <div class="section-tag">Your results</div>
      <div class="card-header">
        <div class="card-icon">📊</div>
        <div><div class="card-title">${state.intake.business} — ${state.intake.type}</div><div class="card-subtitle">${state.intake.name} · ${state.intake.stage} · Overall readiness: ${overall}%</div></div>
      </div>
      <div class="radar-wrap"><canvas id="radarChart" width="360" height="360"></canvas></div>
      <div class="results-grid">${sorted.map(dim=>`<div class="result-card ${getClass(state.scores[dim.id])}"><div class="result-label">${dim.icon} ${dim.label}</div><div class="result-score">${state.scores[dim.id]}%</div>${getTag(state.scores[dim.id])}</div>`).join('')}</div>
    </div>
    ${dimensions.map(dim=>`
    <div class="card">
      <div class="ai-dim-header">
        <div class="ai-dim-title">${dim.icon} ${dim.label} — ${state.scores[dim.id]}%</div>
        <button class="btn-ai" onclick="getFeedback('${dim.id}')">Get AI feedback</button>
      </div>
      <div class="ai-feedback-section"><div id="feedback-${dim.id}" class="ai-feedback-box" style="display:none;"></div></div>
    </div>`).join('')}
    <div class="card submit-box">
      <h3>Submit your results to Connected Futures Hub</h3>
      <p>Your scores and mentor preferences will be sent to the CFH team so we can tailor your program experience.</p>
      <div class="nav-buttons" style="justify-content:center;">
        <button class="btn btn-gold" onclick="submitResults()">Submit to CFH →</button>
        <button class="btn btn-outline" onclick="copyResults()" style="border-color:rgba(255,255,255,0.5);color:white;">Copy results</button>
      </div>
      <div id="submit-success" class="submit-success">
        <div class="tick">✅</div>
        <strong>Results submitted!</strong><br>
        <span style="font-size:13px;opacity:0.85;">The Connected Futures Hub team will be in touch. You can now close this window.</span>
      </div>
      <div style="margin-top:14px;"><button class="btn btn-secondary" onclick="restart()" style="width:100%;margin-top:8px;">Start again</button></div>
    </div>`;
}

function drawRadar() {
  setTimeout(() => {
    const canvas = document.getElementById('radarChart');
    if (!canvas) return;
    new Chart(canvas.getContext('2d'), {
      type: 'radar',
      data: { labels: dimensions.map(d=>d.label), datasets: [{ label: state.intake.business, data: dimensions.map(d=>state.scores[d.id]), backgroundColor: 'rgba(139,0,204,0.12)', borderColor: '#8B00CC', borderWidth: 2.5, pointBackgroundColor: '#F5A623', pointRadius: 5 }] },
      options: { responsive: true, scales: { r: { min:0, max:100, ticks:{stepSize:25,font:{size:10},color:'#6a5a7a'}, grid:{color:'rgba(0,0,0,0.07)'}, pointLabels:{font:{size:11,weight:'600'},color:'#5a0085'} } }, plugins:{legend:{display:false}} }
    });
  }, 50);
}

async function getFeedback(dimId) {
  const dim = dimensions.find(d=>d.id===dimId);
  const score = state.scores[dimId];
  const box = document.getElementById('feedback-'+dimId);
  box.style.display='block'; box.className='ai-feedback-box loading'; box.textContent='Generating feedback...';
  const answers = dim.questions.map(q=>`Q: ${q.text}\nA: ${q.options[state.answers[q.id]||0]}`).join('\n\n');
  const prompt = `You are an expert advisor for the Connected Futures Hub, an Investor Readiness Program for Regional Female Entrepreneurs based in the South West of Western Australia. A founder has just completed a self-assessment.

Founder: ${state.intake.name}
Business: ${state.intake.business}
Stage: ${state.intake.stage}
Assessment point: ${state.intake.type}
Dimension: ${dim.label}
Score: ${score}%

Their answers:
${answers}

Write 3–4 sentences of warm, practical, specific feedback for this dimension. Be direct and encouraging — this is a program designed for regional female founders who may face unique challenges including geographic isolation, confidence barriers, and limited access to networks. Acknowledge what they are doing well, identify the most important gap, and suggest one concrete next step. Use plain, accessible language.`;
  try {
    const res = await fetch('/.netlify/functions/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({prompt}) });
    const data = await res.json();
    if (data.content && data.content[0]) { box.className='ai-feedback-box'; box.textContent=data.content[0].text; }
    else throw new Error('No response');
  } catch(e) { box.className='ai-feedback-box error'; box.textContent='Could not load AI feedback. Please try again.'; }
}

function copyResults() {
  const lines=[`CFH Investment Readiness Assessment — ${state.intake.business} (${state.intake.type})`,`Founder: ${state.intake.name} | Stage: ${state.intake.stage}`,`Date: ${new Date().toLocaleDateString('en-AU')}`,'', ...dimensions.map(d=>`${d.label}: ${state.scores[d.id]}%`),'',`Overall: ${Math.round(Object.values(state.scores).reduce((a,b)=>a+b,0)/dimensions.length)}%`];
  navigator.clipboard.writeText(lines.join('\n')).then(()=>alert('Results copied to clipboard!'));
}

function submitResults() {
  const isPre = state.intake.type==='Start of program';
  const qs = isPre ? mentorQuestions.pre : mentorQuestions.post;
  function fmt(q) { const val=state.mentorData[q.id]; if(q.type==='checkbox'&&Array.isArray(val))return val.map(i=>q.options[i]).join(', '); if(q.type==='options'&&val!==undefined)return q.options[val]; if(q.type==='stars')return val?`${val}/5 stars`:''; if(q.type==='scale')return val!==undefined?`${val}/10`:''; return val||''; }
  const mf={};
  qs.forEach(q=>{mf[q.id]=fmt(q);});
  const body=new URLSearchParams({'form-name':'cfh-tna',founder_name:state.intake.name,business_name:state.intake.business,stage:state.intake.stage,assessment_type:state.intake.type,submission_date:new Date().toLocaleString('en-AU',{timeZone:'Australia/Perth'}),score_business_foundations:state.scores.business_foundations+'%',score_investor_readiness:state.scores.investor_readiness+'%',score_commercialisation:state.scores.commercialisation+'%',score_founder_capability:state.scores.founder_capability+'%',score_networks:state.scores.networks+'%',score_wellbeing:state.scores.wellbeing+'%',overall_score:Math.round(Object.values(state.scores).reduce((a,b)=>a+b,0)/dimensions.length)+'%',...mf});
  fetch('/',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body}).then(()=>{document.getElementById('submit-success').style.display='block';}).catch(()=>alert('There was a problem submitting. Please try again.'));
}

function restart() { state={screen:'intake',section:0,intake:{name:'',business:'',stage:'',type:''},answers:{},mentorData:{},scores:{}}; window.scrollTo({top:0}); render(); }
function attachHandlers() {}
render();
</script>
</body>
</html>
